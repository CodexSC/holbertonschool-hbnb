<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBnB - Place Details</title>
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">
        <img src="favicon-96x96.png" alt="HBnB logo" class="logo" />
        <h1 class="site-title">HBnB</h1>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a class="nav-link" href="index.html">Places</a>
        <a id="login-link" class="login-button" href="login.html">Login</a>
        <a id="logout-link" class="login-button" href="login.html">Logout</a>
      </nav>
    </header>

    <main>
      <section id="place-details" class="place-details" aria-label="Place details">
        <h2>Place Details</h2>
        <p class="place-info">Loading place...</p>
      </section>

      <section class="add-review hidden" id="add-review-access" aria-label="Add review action">
        <h3>Share your experience</h3>
        <p>Help other guests by adding a review for this place.</p>
        <a id="add-review-button" class="action-button" href="add_review.html">Add Review</a>
      </section>

      <section aria-label="Place reviews">
        <h3>Reviews</h3>
        <p id="message" class="message" role="status" aria-live="polite"></p>
        <div id="reviews-list" class="reviews-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>All rights reserved.</p>
    </footer>

    <script type="module" src="js/place.js"></script>
  </body>
</html>
