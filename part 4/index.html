<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBnB - Places</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">
        <img src="logo.png" alt="HBnB logo" class="logo" />
        <h1 class="site-title">HBnB</h1>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a class="nav-link" href="index.html">Places</a>
        <a class="nav-link" href="login.html">Login</a>
        <a id="logout-link" class="login-button" href="login.html">Logout</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h2>Discover stays with character</h2>
        <p>Browse available places and narrow the list by country.</p>
      </section>

      <section class="controls" aria-label="Filters">
        <label for="country-filter">Country</label>
        <select id="country-filter" name="country-filter">
          <option value="">All countries</option>
        </select>
      </section>

      <p id="message" class="message" role="status" aria-live="polite"></p>
      <section id="places-list" class="places-grid" aria-label="List of places"></section>
    </main>

    <footer class="site-footer">
      <p>All rights reserved.</p>
    </footer>

    <script type="module" src="js/index.js"></script>
  </body>
</html>
